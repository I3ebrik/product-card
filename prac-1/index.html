<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>iPhone 17 Pro</title>
    <style>
        /* стилёчк */
        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        
        .product-card {
            width: 300px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .product-card img {
            width: 100%;
            border-radius: 8px;
        }
        
        .product-card h3 {
            color: #333;
            margin: 15px 0 10px;
        }
        
        .product-card p {
            color: #666;
            line-height: 1.5;
        }
        
        .product-card .price {
            font-size: 24px;
            color: #4361ee;
            margin: 15px 0;
        }
        
        .product-card .button {
            display: block;
            background: #4361ee;
            color: white;
            padding: 12px;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="product-card">
        <img src="iphone17.jpg" alt="iPhone 17 Pro">
        <h3>iPhone 17 Pro</h3>
        <p>6.9" Super Retina XDR дисплей, 256GB памяти, камера 48MP, чип A19 Pro</p>
        <div class="price">129 990 ₽</div>
        <a href="#" class="button">Купить</a>
    </div>
</body>
</html>
